apiVersion: apps/v1
kind: Deployment
metadata:
  name: assetmanagementsystem-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: assetmanagementsystem
  template:
    metadata:
      labels:
        app: assetmanagementsystem
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z mysql-service 3306; do
                echo "Waiting for MySQL...";
                sleep 3;
              done
              echo "MySQL is up!"
      containers:
        - name: assetmanagementsystem
          image: assetmanagementsystem:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8085
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-configmap
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: mysql-password
---
apiVersion: v1
kind: Service
metadata:
  name: assetmanagementsystem-service
spec:
  type: NodePort
  selector:
    app: assetmanagementsystem
  ports:
    - port: 8084
      targetPort: 8085
      nodePort: 30084