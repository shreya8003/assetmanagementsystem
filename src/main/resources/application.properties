# Database configuration

spring.datasource.url=jdbc:mysql://localhost:3306/assetdb?createDatabasefNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=assetuser
spring.datasource.password=strongpassword


# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Metrics
management.metrics.enable.all=true

# Web settings
server.port=8085
spring.mvc.formcontent.filter.enabled=true
