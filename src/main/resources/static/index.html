<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AssetFlow — Login</title>
  <meta name="description" content="Login to AssetFlow - the modern enterprise asset management platform." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="login-page">

  <!-- Animated Background -->
  <div class="login-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="grid-overlay"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <!-- Brand -->
      <div class="login-brand">
        <div class="brand-icon">
          <i class="bi bi-layers-fill"></i>
        </div>
        <h1 class="brand-name">AssetFlow</h1>
        <p class="brand-tagline">Enterprise Asset Management</p>
      </div>

      <!-- Form -->
      <form id="loginForm" autocomplete="off">
        <div class="form-floating mb-3" id="usernameGroup">
          <input
            type="text"
            class="form-control login-input"
            id="username"
            name="username"
            placeholder="Username"
            required
            autofocus
          />
          <label for="username"><i class="bi bi-person me-2"></i>Username</label>
        </div>

        <div class="form-floating mb-4" id="passwordGroup">
          <input
            type="password"
            class="form-control login-input"
            id="password"
            name="password"
            placeholder="Password"
            required
          />
          <label for="password"><i class="bi bi-lock me-2"></i>Password</label>
          <button type="button" class="btn-toggle-pw" id="togglePassword" aria-label="Toggle password visibility">
            <i class="bi bi-eye" id="togglePwIcon"></i>
          </button>
        </div>

        <div id="loginError" class="alert alert-danger login-error d-none" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <span id="loginErrorMsg">Invalid credentials. Please try again.</span>
        </div>

        <button type="submit" class="btn btn-login w-100" id="loginBtn">
          <span id="loginBtnText"><i class="bi bi-arrow-right-circle me-2"></i>Sign In</span>
          <span id="loginBtnSpinner" class="d-none">
            <span class="spinner-border spinner-border-sm me-2" role="status"></span>Signing in...
          </span>
        </button>
      </form>

      <div class="login-hint">
        <i class="bi bi-info-circle me-1"></i>Default credentials: <code>admin / admin123</code>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="login.js"></script>
</body>
</html>
