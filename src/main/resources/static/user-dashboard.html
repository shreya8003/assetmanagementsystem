<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AssetFlow — My Assets</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dashboard-page">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="brand-mark">
        <i class="bi bi-layers-fill"></i>
      </div>
      <div class="brand-text">
        <span class="brand-title">AssetFlow</span>
        <span class="brand-sub">Employee Portal</span>
      </div>
      <button class="sidebar-toggle-btn d-lg-none" id="sidebarClose">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <nav class="sidebar-nav" role="navigation">
      <div class="nav-section-label">My Account</div>
      <a href="#" class="nav-item active" id="nav-myassets">
        <i class="bi bi-box-seam-fill"></i>
        <span>My Assets</span>
      </a>
      <a href="#" class="nav-item" id="nav-maintenance">
        <i class="bi bi-tools"></i>
        <span>Maintenance History</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">
          <i class="bi bi-person-fill"></i>
        </div>
        <div class="user-details">
          <span class="user-name" id="sidebarUsername">User</span>
          <span class="user-role">Employee</span>
        </div>
      </div>
      <button class="btn-logout" id="logoutBtn" title="Logout">
        <i class="bi bi-box-arrow-right"></i>
      </button>
    </div>
  </aside>

  <div class="sidebar-overlay d-lg-none" id="sidebarOverlay"></div>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="mainContent">

    <header class="topbar">
      <button class="sidebar-toggle-btn d-lg-none" id="sidebarOpen">
        <i class="bi bi-list"></i>
      </button>
      <div class="topbar-title">
        <h2 id="pageTitle">My Assets</h2>
        <span class="page-breadcrumb">Assets currently assigned to you</span>
      </div>
      <div class="topbar-actions">
        <button class="btn-icon" id="refreshBtn" title="Refresh">
          <i class="bi bi-arrow-clockwise"></i>
        </button>
        <div class="topbar-user">
          <div class="user-avatar-sm">
            <i class="bi bi-person-fill"></i>
          </div>
          <span id="topbarUsername">User</span>
        </div>
      </div>
    </header>

    <!-- Toast -->
    <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999">
      <div id="appToast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
          <div class="toast-body" id="toastMsg">Done.</div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      </div>
    </div>

    <div class="content-area">

      <!-- Summary card -->
      <div class="row g-4 mb-4">
        <div class="col-12 col-sm-4">
          <div class="stat-card stat-card--blue">
            <div class="stat-icon"><i class="bi bi-box-seam-fill"></i></div>
            <div class="stat-body">
              <div class="stat-number" id="stat-total">—</div>
              <div class="stat-label">Total Assigned</div>
            </div>
          </div>
        </div>
        <div class="col-12 col-sm-4">
          <div class="stat-card stat-card--teal">
            <div class="stat-icon"><i class="bi bi-check-circle-fill"></i></div>
            <div class="stat-body">
              <div class="stat-number" id="stat-active">—</div>
              <div class="stat-label">Active</div>
            </div>
          </div>
        </div>
        <div class="col-12 col-sm-4">
          <div class="stat-card stat-card--orange">
            <div class="stat-icon"><i class="bi bi-tools"></i></div>
            <div class="stat-body">
              <div class="stat-number" id="stat-maintenance">—</div>
              <div class="stat-label">Under Maintenance</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Assets table -->
      <div id="section-myassets">
        <div class="content-card">
          <div class="card-header-custom">
            <h3 class="card-title"><i class="bi bi-box-seam-fill me-2"></i>Assigned Assets</h3>
          </div>
          <div class="search-bar mb-3">
            <i class="bi bi-search"></i>
            <input type="text" class="search-input" id="assetSearch" placeholder="Search assets…" />
          </div>
          <div class="table-responsive" id="assetsTableWrap">
            <div class="loading-state">
              <div class="spinner-border text-primary" role="status"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Maintenance History section -->
      <div id="section-maintenance" class="d-none">
        <div class="content-card">
          <div class="card-header-custom">
            <h3 class="card-title"><i class="bi bi-tools me-2"></i>Maintenance History</h3>
          </div>
          <div class="search-bar mb-3">
            <i class="bi bi-search"></i>
            <input type="text" class="search-input" id="maintSearch" placeholder="Search requests…" />
          </div>
          <div class="table-responsive" id="maintHistoryWrap">
            <div class="loading-state">
              <div class="spinner-border text-primary" role="status"></div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </main>

  <!-- Maintenance Modal -->
  <div class="modal fade" id="maintenanceModal" tabindex="-1" aria-labelledby="maintenanceModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content modal-custom">
        <div class="modal-header modal-header-custom">
          <h5 class="modal-title" id="maintenanceModalLabel"><i class="bi bi-tools me-2"></i>Report Maintenance</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="maintenanceForm">
            <input type="hidden" id="maintAssetId" />
            <div class="mb-3">
              <label class="form-label">Asset</label>
              <input type="text" class="form-control form-control-custom" id="maintAssetName" readonly />
            </div>
            <div class="mb-3">
              <label class="form-label" for="maintDesc">Description <span class="text-danger">*</span></label>
              <textarea class="form-control form-control-custom" id="maintDesc" rows="4"
                placeholder="Describe the issue or maintenance needed…"></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer modal-footer-custom">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary-glow" id="submitMaintenanceBtn">
            <i class="bi bi-send me-1"></i>Submit
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="user-dashboard.js"></script>
</body>
</html>
